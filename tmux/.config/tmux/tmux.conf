# -- Prefix -------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Terminal & True Color -----------------------------------------------------
# Set the inner TERM to tmux-256color (programs inside tmux see this).
set -g default-terminal "tmux-256color"

# Enable true color (24-bit RGB) for the outer terminal. iOS apps (Blink Shell,
# Termius, Prompt) report various $TERM values, so we use wildcards to cover
# xterm-*, screen-*, tmux-*, and any others. Both Tc (tmux extension) and RGB
# (standard terminfo) are set for maximum compatibility.
set -as terminal-overrides ",*-256color:Tc"
set -as terminal-overrides ",xterm*:Tc:RGB"
set -as terminal-overrides ",screen*:Tc:RGB"
set -as terminal-overrides ",tmux*:Tc:RGB"

# tmux 3.2+ terminal-features: modern way to declare RGB support.
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

# Enable strikethrough, styled underlines (used by some TUI apps).
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -- Scrollback ----------------------------------------------------------------
set -g history-limit 50000

# -- General -------------------------------------------------------------------
set -g escape-time 10
set -g focus-events on
set -g display-time 3000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# -- Mouse (critical for iOS touch scroll) ------------------------------------
set -g mouse on

# -- Vi Copy Mode --------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

# -- Clipboard -----------------------------------------------------------------
if-shell "command -v pbcopy" {
    bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
}
set -g set-clipboard on

# -- Pane Navigation -----------------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Splits & Windows ---------------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# -- Window Navigation --------------------------------------------------------
bind -n M-h previous-window
bind -n M-l next-window

# -- Reload --------------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# -- Status Bar (Tomorrow Night) -----------------------------------------------
set -g status-style "bg=#1d1f21,fg=#c5c8c6"
set -g status-left-length 30
set -g status-right-length 50
set -g status-left "#[fg=#1d1f21,bg=#81a2be,bold] #S #[fg=#81a2be,bg=#1d1f21] "
set -g status-right "#[fg=#c5c8c6] %H:%M "
set -g status-justify left

setw -g window-status-format "#[fg=#969896] #I:#W "
setw -g window-status-current-format "#[fg=#81a2be,bold] #I:#W "

set -g pane-border-style "fg=#373b41"
set -g pane-active-border-style "fg=#81a2be"
set -g message-style "bg=#373b41,fg=#c5c8c6"
setw -g mode-style "bg=#373b41,fg=#c5c8c6"

# -- TPM -----------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '~/.config/tmux/plugins/tpm/tpm'
